# UNVALIDATED - experimental physics_v2 candidate (not yet validated)
# Created 2026-02-03: use configs/physics_v2.yaml for default training.
# =============================================================================
# PHYSICS V2 CANDIDATE - TRAINING SAFE
# =============================================================================
# Purpose: Slower top speed, forgiving steering, stable training.
# Track: Simple ellipse (waviness=0, waves=0)
# Notes: Easier to control, reduced turn penalties.
# =============================================================================

car:
  mass: 1.0
  width: 40.0
  height: 20.0
  max_speed: 280.0
  engine_power: 300.0
  accel_boost: 0.12
  throttle_response: 0.07
  lateral_friction: 1.1
  rolling_friction: 0.035
  air_drag: 0.004
  angular_damping: 0.9
  steering_power: 600.0
  steering_speed_ref: 220.0
  steering_min_factor: 0.18
  turning_drag: 0.45

lidar:
  num_rays: 9
  ray_angles: [-90.0, -67.5, -45.0, -22.5, 0.0, 22.5, 45.0, 67.5, 90.0]
  max_distance: 400.0

track:
  width: 200.0
  outer_radius_x: 350.0
  outer_radius_y: 250.0
  center_x: 400.0
  center_y: 300.0
  waviness: 0.0
  waves: 0
  wave_phase: 0.0

render:
  screen_width: 800
  screen_height: 600
  fps: 60
  show_lidar: true
  car_color: [0, 100, 255]
  wall_color: [100, 100, 100]
  lidar_clear_color: [0, 255, 0]
  lidar_hit_color: [255, 0, 0]
  background_color: [30, 30, 30]

physics_dt: 0.016666666666666666  # 1/60
max_episode_steps: 2000

checkpoint_reward: 1.0
speed_bonus_scale: 0.05
progress_reward_scale: 0.5
slowdown_distance: 0.0
slowdown_penalty_scale: 0.0
collision_penalty: -20.0
time_penalty: -0.0
