# =============================================================================
# PHYSICS V2 - Baseline Config (Simple Track)
# =============================================================================
# Purpose: Default training config for the new physics model.
# Track: Simple ellipse (waviness=0, waves=0)
# Notes: Tuned for speed-dependent steering + air drag + accel boost + throttle smoothing.
# =============================================================================

car:
  mass: 1.0
  width: 40.0
  height: 20.0
  max_speed: 360.0
  engine_power: 200.0
  accel_boost: 0.05
  throttle_response: 0.05
  lateral_friction: 1.3
  rolling_friction: 0.03
  air_drag: 0.004
  angular_damping: 0.6
  steering_power: 900.0
  steering_speed_ref: 450.0
  steering_min_factor: 0.02
  turning_drag: 0.7

lidar:
  num_rays: 9
  ray_angles: [-90.0, -67.5, -45.0, -22.5, 0.0, 22.5, 45.0, 67.5, 90.0]
  max_distance: 400.0

track:
  width: 200.0
  outer_radius_x: 350.0
  outer_radius_y: 250.0
  center_x: 400.0
  center_y: 300.0
  waviness: 0.0
  waves: 0
  wave_phase: 0.0

grid:
  grid_size: 36
  camera_height: 50.0
  camera_pitch: 45.0
  fov_horizontal: 60.0
  near_distance: 30.0
  far_distance: 200.0

obs_type: grid

render:
  screen_width: 800
  screen_height: 600
  fps: 60
  show_lidar: true
  show_grid: true
  car_color: [0, 100, 255]
  wall_color: [100, 100, 100]
  lidar_clear_color: [0, 255, 0]
  lidar_hit_color: [255, 0, 0]
  background_color: [30, 30, 30]

physics_dt: 0.016666666666666666  # 1/60
max_episode_steps: 2000

random_start: true
random_start_lateral_fraction: 1.0

checkpoint_reward: 1.0
speed_bonus_scale: 0.05
progress_reward_scale: 0.75
slowdown_distance: 0.0
slowdown_penalty_scale: 0.0
collision_penalty: -20.0
terminate_on_collision: true
time_penalty: -0.0
