# Wavy V2 - CNN Occupancy Grid
# Purpose: Train PPO with CnnPolicy (NatureCNN) on 36x36 occupancy grid
# Based on: wavy_v2_progress_0p75.yaml (best PPO config)
# Usage: py scripts/train.py --cnn --config configs/wavy_v2_cnn.yaml

car:
  mass: 1.0
  width: 40.0
  height: 20.0
  max_speed: 1000.0
  engine_power: 500.0
  lateral_friction: 0.5
  rolling_friction: 0.05
  angular_damping: 0.7
  steering_power: 750.0

lidar:
  num_rays: 9
  ray_angles: [-90.0, -67.5, -45.0, -22.5, 0.0, 22.5, 45.0, 67.5, 90.0]
  max_distance: 400.0

track:
  width: 100.0
  outer_radius_x: 350.0
  outer_radius_y: 250.0
  center_x: 400.0
  center_y: 300.0
  waviness: 0.08
  waves: 5
  wave_phase: 0.0

grid:
  grid_size: 36
  camera_height: 50.0      # Height above ground (world units)
  camera_pitch: 45.0       # Downward tilt from horizontal (degrees)
  fov_horizontal: 60.0     # Horizontal field of view (degrees)
  near_distance: 30.0      # Min visible distance ahead of car
  far_distance: 200.0      # Max visible distance ahead of car

obs_type: grid

render:
  screen_width: 800
  screen_height: 600
  fps: 60
  show_lidar: true
  show_grid: true
  car_color: [0, 100, 255]
  wall_color: [100, 100, 100]
  lidar_clear_color: [0, 255, 0]
  lidar_hit_color: [255, 0, 0]
  background_color: [30, 30, 30]

physics_dt: 0.016666666666666666
max_episode_steps: 2000

checkpoint_reward: 1.0
speed_bonus_scale: 0.05
progress_reward_scale: 0.75
slowdown_distance: 0.0
slowdown_penalty_scale: 0.0
collision_penalty: -20.0
time_penalty: -0.0
